# Minimal Klipper config for driving the Gazebo bridge without a real MCU.
# Run Klippy with -o and -d out/klipper.dict so this MCU is file-backed.

[mcu]
serial: /tmp/pentos_fake_mcu

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 20
max_z_accel: 100

[stepper_x]
step_pin: 0
dir_pin: 1
enable_pin: !2
microsteps: 16
rotation_distance: 40
endstop_pin: ^3
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_y]
step_pin: 4
dir_pin: 5
enable_pin: !6
microsteps: 16
rotation_distance: 40
endstop_pin: ^7
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_z]
step_pin: 8
dir_pin: 9
enable_pin: !10
microsteps: 16
rotation_distance: 8
endstop_pin: ^11
position_endstop: 0
position_max: 250
homing_speed: 10

[force_move]
enable_force_move: true

[virtual_sdcard]
path: /home/evank/code/rphys/pentos/printer_data/gcodes

[display_status]

[pause_resume]
